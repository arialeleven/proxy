name: Release

# Cut a release by pushing a semver tag, e.g.:
#   git tag v1.1.0 && git push origin v1.1.0
# or run this workflow manually from the Actions tab.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1.0)'
        required: true

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push the image to GHCR

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build amd64 image tarball (offline download)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag "${IMAGE_NAME}:${{ steps.version.outputs.version }}" \
            --load .
          docker save "${IMAGE_NAME}:${{ steps.version.outputs.version }}" \
            | gzip > "tls-auth-proxy-${{ steps.version.outputs.version }}-amd64.tar.gz"

      - name: Package the Chrome extension
        run: bash scripts/build-extension.sh

      - name: Collect release artifacts
        run: |
          mkdir -p release
          mv "tls-auth-proxy-${{ steps.version.outputs.version }}-amd64.tar.gz" release/
          if compgen -G "dist/*.zip" > /dev/null; then
            cp dist/*.zip release/
          fi
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: release/*
          body: |
            ## TLS auth proxy ${{ steps.version.outputs.tag }}

            TLS-terminating HTTP/1.1 forward proxy with Basic (login:password) auth.

            ### Pull the image
            ```bash
            docker pull ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```

            ### Run it (port 6443, self-signed cert auto-generated on first run)
            ```bash
            docker run --rm -p 6443:6443 \
              -e PROXY_USERS="alice:secret" \
              ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```

            ### Offline install (no registry access)
            Download `tls-auth-proxy-${{ steps.version.outputs.version }}-amd64.tar.gz` below, then:
            ```bash
            docker load < tls-auth-proxy-${{ steps.version.outputs.version }}-amd64.tar.gz
            docker run --rm -p 6443:6443 -e PROXY_USERS="alice:secret" \
              ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```

            ### Test
            ```bash
            curl --proxy-insecure -x https://alice:secret@localhost:6443 https://example.com
            ```

services:
  proxy:
    build: .
    image: https-auth-proxy:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Override the demo credentials from config.js.
      # Format: "user1:pass1,user2:pass2"
      PROXY_USERS: "alice:secret"
      PROXY_HOST: "0.0.0.0"
      PROXY_PORT: "8080"
